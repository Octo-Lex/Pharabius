services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: pharabius
      POSTGRES_USER: pharabius
      POSTGRES_PASSWORD: pharabius_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharabius"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: platform/backend/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://pharabius:pharabius_dev@db:5432/pharabius
      ADMIN_TOKEN: ${ADMIN_TOKEN:-pharabius_admin_dev}
      STORAGE_PATH: /var/lib/pharabius/bundles
    volumes:
      - bundle_storage:/var/lib/pharabius/bundles

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  bundle_storage:
