name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy src
        continue-on-error: true  # Pre-existing typing issues; not blocking CI

      - name: Check architecture boundaries
        run: lint-imports
        continue-on-error: true  # No import-linter config; not blocking CI

      - name: Run tests
        run: PYTHONPATH=benchmarks:$PYTHONPATH pytest

      - name: Build package
        run: python -m build
