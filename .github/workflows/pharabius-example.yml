name: Pharabius Debt Analysis
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  debt-analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run Pharabius
        uses: ./
        with:
          command: run+gate
          mode: advisory
          max-critical: "0"
          sarif-output: pharabius.sarif
          generate-sarif: "true"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .ai-debt/reports/findings.sarif
