name: "Pharabius Technical Debt Analysis"
description: "Run Pharabius analysis and quality gate in CI. Generates local SARIF and quality gate reports. No external uploads."
author: "Elephant-Rock-Lab"

branding:
  icon: "shield"
  color: "blue"

inputs:
  pharabius-version:
    description: "Pharabius package version to install (pinned for reproducibility)"
    required: false
    default: "2.0.1"
  command:
    description: "Command to run: 'gate', 'run', or 'run+gate' (run analysis then gate)"
    required: false
    default: "gate"
  mode:
    description: "Gate mode: 'strict' (fail on any threshold breach), 'warn' (annotate but pass), 'advisory' (report only)"
    required: false
    default: "strict"
  max-critical:
    description: "Maximum allowed Critical findings (quality gate)"
    required: false
    default: "0"
  max-high:
    description: "Maximum allowed High findings (quality gate)"
    required: false
    default: "10"
  max-total:
    description: "Maximum allowed total findings (quality gate)"
    required: false
    default: "50"
  fail-on-gate:
    description: "Fail the workflow if quality gate does not pass (strict mode only)"
    required: false
    default: "true"
  generate-sarif:
    description: "Generate local SARIF artifact file. Does not upload anywhere."
    required: false
    default: "false"
  output-dir:
    description: "Directory for generated reports and artifacts"
    required: false
    default: ".ai-debt/reports"

runs:
  using: "composite"
  steps:
    - name: Install Pharabius
      shell: bash
      run: pip install -e .

    - name: Run analysis
      if: inputs.command == 'run' || inputs.command == 'run+gate'
      shell: bash
      run: |
        if [ ! -d .ai-debt ]; then
          ai-debt init
        fi
        ai-debt run

    - name: Run quality gate
      if: inputs.command == 'gate' || inputs.command == 'run+gate'
      shell: bash
      run: |
        GATE_ARGS=""
        if [ "${{ inputs.max-critical }}" != "" ]; then
          GATE_ARGS="$GATE_ARGS --max-critical ${{ inputs.max-critical }}"
        fi
        if [ "${{ inputs.max-high }}" != "" ]; then
          GATE_ARGS="$GATE_ARGS --max-high ${{ inputs.max-high }}"
        fi
        if [ "${{ inputs.max-total }}" != "" ]; then
          GATE_ARGS="$GATE_ARGS --max-total ${{ inputs.max-total }}"
        fi

        if ai-debt gate $GATE_ARGS; then
          echo "::notice::Quality gate PASSED"
        else
          if [ "${{ inputs.mode }}" == "strict" ] && [ "${{ inputs.fail-on-gate }}" == "true" ]; then
            echo "::error::Quality gate FAILED (strict mode)"
            exit 1
          elif [ "${{ inputs.mode }}" == "warn" ]; then
            echo "::warning::Quality gate FAILED (warn mode — non-blocking)"
          else
            echo "::notice::Quality gate FAILED (advisory mode — report only)"
          fi
        fi

    - name: Generate local SARIF
      if: inputs.generate-sarif == 'true'
      shell: bash
      run: |
        mkdir -p "${{ inputs.output-dir }}"
        ai-debt export --format sarif --output-dir "${{ inputs.output-dir }}"
        echo "::notice::SARIF generated locally at ${{ inputs.output-dir }}/findings.sarif"
